<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSANE Cyber Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Share Tech Mono', monospace;
  color:#00ffcc;
  overflow:hidden;
  background:black;
}

/* MATRIX CANVAS */
canvas{position:fixed;top:0;left:0;z-index:-1}

/* TERMINAL */
.terminal{
  padding:20px;
}

.line{
  margin:5px 0;
}

.cursor{
  display:inline-block;
  width:10px;
  background:#00ffcc;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0}
}

/* GLITCH TEXT */
.glitch{
  font-size:2rem;
  position:relative;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
}

.glitch::before{
  animation:glitch1 0.5s infinite;
  color:red;
}

.glitch::after{
  animation:glitch2 0.5s infinite;
  color:blue;
}

@keyframes glitch1{
  0%{transform:translate(1px,1px)}
  50%{transform:translate(-1px,-1px)}
  100%{transform:translate(1px,-1px)}
}

@keyframes glitch2{
  0%{transform:translate(-1px,0)}
  50%{transform:translate(1px,1px)}
  100%{transform:translate(-1px,1px)}
}

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="terminal" id="terminal"></div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width/fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize+"px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);
    if(y*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw,35);

// TERMINAL TYPING
const terminal = document.getElementById("terminal");
const commands = [
  "> Initializing system...",
  "> Access granted",
  "> Loading portfolio.exe",
  "> Welcome, Developer",
  "> Skills: HTML CSS JS",
  "> Projects loaded",
  "> Ready..."
];

let lineIndex = 0;

function typeLine(text, callback){
  let i=0;
  const line = document.createElement("div");
  line.className="line";
  terminal.appendChild(line);

  function type(){
    line.innerHTML = text.substring(0,i)+"<span class='cursor'></span>";
    i++;
    if(i<=text.length){
      setTimeout(type,40);
    }else{
      line.innerHTML = text;
      callback && callback();
    }
  }
  type();
}

function runTerminal(){
  if(lineIndex < commands.length){
    typeLine(commands[lineIndex],()=>{
      lineIndex++;
      runTerminal();
    });
  }else{
    showMain();
  }
}

runTerminal();

// SHOW MAIN CONTENT
function showMain(){
  const title = document.createElement("h1");
  title.className = "glitch";
  title.setAttribute("data-text","ACCESS GRANTED");
  title.innerText = "ACCESS GRANTED";

  const btn = document.createElement("button");
  btn.innerText = "ENTER SYSTEM";
  btn.style.marginTop = "20px";
  btn.style.padding = "10px";
  btn.onclick = ()=>alert("Welcome to your portfolio 😎");

  terminal.appendChild(title);
  terminal.appendChild(btn);
}

</script>

</body>
</html>
